<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Look Down</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: #160d29; font-family: sans-serif; }
#wrapper { position: relative; width: 100vw; height: 100vh; }
canvas { display: block; width: 100%; height: 100%; background: #1a0b2e; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
#scoreDisplay { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(13,2,33,0.6); color: #2de2e6; padding: 6px 22px; border-radius: 20px; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
#gameButtons { position: absolute; top: 12px; right: 12px; display: none; gap: 8px; pointer-events: auto; }
.gameBtn { background: rgba(13,2,33,0.6); color: #c9a9ff; border: 1px solid rgba(155,93,229,0.5); border-radius: 14px; padding: 7px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
.gameBtn:hover { background: rgba(125,42,232,0.5); color: #fff; }
#startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,2,33,0.9); color: #fff; z-index: 10; }
#startScreen h1, #gameOverScreen h1 { font-size: 44px; font-weight: 700; margin-bottom: 12px; color: #ff2e97; text-shadow: 0 0 18px rgba(255,46,151,0.6); }
#startScreen p, #gameOverScreen p { font-size: 18px; color: #c9a9ff; margin-bottom: 10px; }
.gBtn { background: #ff2e97; color: #fff; border: none; border-radius: 10px; padding: 14px 40px; font-size: 19px; cursor: pointer; margin-top: 18px; box-shadow: 0 0 20px rgba(255,46,151,0.5); }
.gBtn:hover { background: #c724b1; }
#controls { position: absolute; bottom: 0; left: 0; display: flex; justify-content: space-between; padding: 14px 18px; width: 100%; z-index: 5; }
.ctrlBtn { background: rgba(125,42,232,0.35); color: #fff; border: 1px solid rgba(45,226,230,0.4); border-radius: 12px; padding: 16px 36px; font-size: 24px; cursor: pointer; user-select: none; }
.ctrlBtn:active { background: rgba(45,226,230,0.5); }
.histTitle { font-size: 16px; color: #c9a9ff; margin: 18px 0 6px; font-weight: 600; letter-spacing: 0.5px; }
#scoreHistory { width: 340px; max-width: 86vw; max-height: 34vh; overflow-y: auto; }
.histRow { display: flex; align-items: center; gap: 10px; padding: 7px 14px; margin: 5px 0; border-radius: 8px; background: rgba(125,42,232,0.18); color: #e8d9ff; font-size: 15px; }
.histRow.current { background: rgba(255,46,151,0.28); color: #fff; box-shadow: 0 0 12px rgba(255,46,151,0.45); }
.histRow .rank { color: #9b5de5; font-weight: 700; width: 30px; }
.histRow .ht { font-weight: 600; flex: 1; }
.histRow .st { color: #ffe14d; }
.histRow .date { color: #8a7aa8; font-size: 12px; width: 44px; text-align: right; }
.histEmpty { color: #8a7aa8; font-size: 14px; }
.pickTitle { font-size: 16px; color: #c9a9ff; margin: 14px 0 4px; font-weight: 600; letter-spacing: 0.5px; }
#avatarPicker { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 92vw; margin-bottom: 4px; }
.avBtn { background: rgba(125,42,232,0.18); border: 2px solid transparent; border-radius: 12px; padding: 3px; cursor: pointer; line-height: 0; }
.avBtn:hover { background: rgba(125,42,232,0.32); }
.avBtn.sel { border-color: #ff2e97; background: rgba(255,46,151,0.15); box-shadow: 0 0 12px rgba(255,46,151,0.5); }
.avBtn canvas { display: block; }
#authScreen, #profileScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,2,33,0.95); color: #fff; z-index: 12; overflow-y: auto; }
#authScreen h1, #profileScreen h1 { font-size: 38px; font-weight: 700; margin-bottom: 6px; color: #ff2e97; text-shadow: 0 0 18px rgba(255,46,151,0.6); }
#authScreen p, #profileScreen p { font-size: 16px; color: #c9a9ff; margin-bottom: 14px; }
.field { width: 280px; max-width: 86vw; margin: 6px 0; }
.field input { width: 100%; padding: 12px 14px; font-size: 16px; border-radius: 10px; border: 1px solid rgba(155,93,229,0.5); background: rgba(125,42,232,0.15); color: #fff; outline: none; }
.field input:focus { border-color: #2de2e6; }
.authErr { color: #ff6b6b; font-size: 14px; min-height: 18px; margin: 4px 0; text-align: center; }
.linkBtn { background: none; border: none; color: #2de2e6; cursor: pointer; font-size: 14px; margin-top: 14px; text-decoration: underline; }
.gBtn.secondary { background: rgba(125,42,232,0.35); box-shadow: none; padding: 11px 26px; font-size: 16px; }
.gBtn.secondary:hover { background: rgba(125,42,232,0.55); }
#startUser { font-size: 20px; color: #2de2e6; font-weight: 600; margin-bottom: 4px; }
.topBtns { display: flex; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="680" height="420"></canvas>
  <div id="ui"><div id="scoreDisplay">Height: 0m</div></div>
  <div id="gameButtons">
    <button class="gameBtn" id="gameProfileBtn">Profile</button>
    <button class="gameBtn" id="gameLogoutBtn">Log out</button>
  </div>
  <div id="authScreen">
    <h1>Don't Look Down</h1>
    <p id="authSubtitle">Sign in to start climbing</p>
    <div class="field"><input id="authUser" type="text" placeholder="Username" autocomplete="username" maxlength="20"></div>
    <div class="field"><input id="authPass" type="password" placeholder="Password" autocomplete="current-password"></div>
    <div id="authPickerWrap" style="display:none">
      <div class="pickTitle">Choose your climber</div>
      <div id="signupPicker"></div>
    </div>
    <div class="authErr" id="authErr"></div>
    <button class="gBtn" id="authSubmit">Sign In</button>
    <button class="linkBtn" id="authToggle">New here? Create an account</button>
  </div>
  <div id="profileScreen" style="display:none">
    <h1>Profile</h1>
    <p>Change your username or climber</p>
    <div class="field"><input id="profileUser" type="text" placeholder="Username" maxlength="20"></div>
    <div class="pickTitle">Your climber</div>
    <div id="profilePicker"></div>
    <div class="authErr" id="profileErr"></div>
    <div class="topBtns">
      <button class="gBtn secondary" id="profileCancel">Back</button>
      <button class="gBtn" id="profileSave">Save</button>
    </div>
  </div>
  <div id="startScreen" style="display:none">
    <h1>Don't Look Down</h1>
    <div id="startUser">Climbing as —</div>
    <p>Climb the platforms — collect stars — don't fall!</p>
    <p style="font-size:15px;color:#7d2ae8">Arrow keys / WASD to move &amp; jump</p>
    <button class="gBtn" id="startBtn">Play</button>
    <div class="topBtns">
      <button class="gBtn secondary" id="profileBtn">Profile</button>
      <button class="gBtn secondary" id="logoutBtn">Log out</button>
    </div>
  </div>
  <div id="gameOverScreen" style="display:none">
    <h1>You fell!</h1>
    <p id="finalScore">Height: 0m</p>
    <p id="finalCoins">Stars: 0</p>
    <div class="histTitle">Best climbs</div>
    <div id="scoreHistory"></div>
    <button class="gBtn" id="restartBtn">Play again</button>
  </div>
</div>
<div id="controls">
  <button class="ctrlBtn" id="leftBtn">◀</button>
  <button class="ctrlBtn" id="jumpBtn">▲ Jump</button>
  <button class="ctrlBtn" id="rightBtn">▶</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
const GRAVITY = 0.45, JUMP = -10.5, SPEED = 4;
const GAP = 78, ZONE_PX = 1000; // change vibe every 100 m (10 px = 1 m)
const CRUMBLE_FRAMES = 42; // frames a crumbling platform lasts after first touch
const THEMES = [
  { bgTop:'#160d29', bgBottom:'#3b1d52', platforms:['#ff2e97','#c724b1','#7d2ae8','#2de2e6','#ff6ec7','#9b5de5','#f15bb5'] },
  { bgTop:'#2b0a0a', bgBottom:'#5e1a12', platforms:['#ff6b35','#f7c331','#ff3c38','#ffa630','#e8491d','#ffd23f'] },
  { bgTop:'#06231a', bgBottom:'#0d4a32', platforms:['#3ddc84','#1b998b','#a8e063','#56ab2f','#21d19f','#9ee493'] },
  { bgTop:'#07223b', bgBottom:'#0d4a6e', platforms:['#48cae4','#0096c7','#90e0ef','#00b4d8','#caf0f8','#5fa8d3'] },
  { bgTop:'#2d0a1f', bgBottom:'#5e1840', platforms:['#ff5d8f','#ff99c8','#c44b9c','#ffb3c6','#e0457b','#ff7eb6'] },
];
function paletteFor(zone) {
  return THEMES[((zone % THEMES.length) + THEMES.length) % THEMES.length].platforms;
}

const AVATARS = [
  { name:'Aqua',  head:'#2de2e6', body:'#ff2e97', legs:'#9b5de5', shape:'round',  face:'smile', hat:null },
  { name:'Ember', head:'#ffd23f', body:'#ff6b35', legs:'#e8491d', shape:'round',  face:'smile', hat:'cap',        hatColor:'#c1121f' },
  { name:'Leaf',  head:'#d8f3a8', body:'#3ddc84', legs:'#1b998b', shape:'round',  face:'smile', hat:null },
  { name:'Wave',  head:'#90e0ef', body:'#0096c7', legs:'#023e8a', shape:'round',  face:'visor', hat:'headphones', hatColor:'#03045e' },
  { name:'Rose',  head:'#ffd6e7', body:'#ff5d8f', legs:'#c44b9c', shape:'round',  face:'smile', hat:'bow',        hatColor:'#ff85a1' },
  { name:'Bolt',  head:'#fff3b0', body:'#ffca3a', legs:'#ff9e00', shape:'round',  face:'smile', hat:'cap',        hatColor:'#ff5400' },
  { name:'Grape', head:'#c77dff', body:'#7d2ae8', legs:'#5a189a', shape:'square', face:'smile', hat:'crown',      hatColor:'#ffd60a' },
  { name:'Bot',   head:'#cdd6e0', body:'#8d99ae', legs:'#495057', shape:'square', face:'bot',   hat:'antenna' },
  { name:'Mint',  head:'#caffbf', body:'#21d19f', legs:'#168aad', shape:'round',  face:'smile', hat:'antenna' },
  { name:'Volt',  head:'#f72585', body:'#4361ee', legs:'#3a0ca3', shape:'square', face:'eyes',  hat:'headphones', hatColor:'#3a0ca3' },
];
const AV_DARK = '#1a1030';
let selectedAvatar = 0;

function drawHat(ctx, cx, cy, a) {
  const c = a.hatColor || a.legs;
  if (a.hat === 'cap') {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(cx, cy-4, 9, Math.PI, 0); ctx.fill();
    ctx.fillRect(cx-11, cy-5, 22, 2.4);
  } else if (a.hat === 'antenna') {
    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx, cy-16); ctx.stroke();
    ctx.fillStyle = a.body; ctx.beginPath(); ctx.arc(cx, cy-17, 2.6, 0, Math.PI*2); ctx.fill();
  } else if (a.hat === 'bow') {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx-7, cy-14); ctx.lineTo(cx-7, cy-6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx, cy-10); ctx.lineTo(cx+7, cy-14); ctx.lineTo(cx+7, cy-6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy-10, 2.2, 0, Math.PI*2); ctx.fill();
  } else if (a.hat === 'crown') {
    ctx.fillStyle = c;
    const cb = cy-8, ct = cy-16;
    ctx.beginPath();
    ctx.moveTo(cx-9, cb); ctx.lineTo(cx-9, ct+3); ctx.lineTo(cx-4.5, cb-2);
    ctx.lineTo(cx, ct); ctx.lineTo(cx+4.5, cb-2); ctx.lineTo(cx+9, ct+3);
    ctx.lineTo(cx+9, cb); ctx.closePath(); ctx.fill();
  } else if (a.hat === 'headphones') {
    ctx.strokeStyle = c; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy-1, 11, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.roundRect(cx-13, cy-3, 5, 8, 2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(cx+8, cy-3, 5, 8, 2); ctx.fill();
  }
}

function drawAvatar(ctx, x, y, w, h, a) {
  const cx = x + w/2, cy = y + 10;
  ctx.fillStyle = a.legs;
  ctx.fillRect(x+3, y+30, 10, 8); ctx.fillRect(x+w-13, y+30, 10, 8);
  ctx.fillStyle = a.body;
  ctx.beginPath(); ctx.roundRect(x+3, y+18, w-6, 14, 3); ctx.fill();
  ctx.fillStyle = a.head;
  ctx.beginPath();
  if (a.shape === 'square') ctx.roundRect(cx-10, cy-10, 20, 20, 5);
  else ctx.arc(cx, cy, 10, 0, Math.PI*2);
  ctx.fill();

  drawHat(ctx, cx, cy, a);

  const eyes = (oy) => { ctx.fillStyle = AV_DARK;
    ctx.beginPath(); ctx.arc(cx-3.5, cy+oy, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+3.5, cy+oy, 1.8, 0, Math.PI*2); ctx.fill(); };
  const smile = (oy) => { ctx.strokeStyle = AV_DARK; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx, cy+oy, 3.6, 0.18*Math.PI, 0.82*Math.PI); ctx.stroke(); };

  if (a.face === 'smile') { eyes(-1); smile(2); }
  else if (a.face === 'eyes') { eyes(0); }
  else if (a.face === 'visor') {
    ctx.fillStyle = 'rgba(20,12,40,0.85)';
    ctx.beginPath(); ctx.roundRect(cx-8, cy-3, 16, 6, 3); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillRect(cx-6, cy-2, 4, 2);
  } else if (a.face === 'bot') {
    ctx.fillStyle = 'rgba(20,12,40,0.85)';
    ctx.beginPath(); ctx.roundRect(cx-8, cy-4, 16, 6, 3); ctx.fill();
    ctx.fillStyle = '#2de2e6'; ctx.fillRect(cx-5, cy-2.5, 2.5, 2.5); ctx.fillRect(cx+2.5, cy-2.5, 2.5, 2.5);
    ctx.fillStyle = AV_DARK; ctx.fillRect(cx-5, cy+4, 10, 2.5);
    ctx.fillStyle = a.head; ctx.fillRect(cx-2.5, cy+4, 1.4, 2.5); ctx.fillRect(cx+1.1, cy+4, 1.4, 2.5);
  }
}
let game, keys = {}, touchLeft = false, touchRight = false, touchJump = false;

const SCORE_KEY = 'dld_scores';
function loadScores() {
  try { return JSON.parse(localStorage.getItem(SCORE_KEY)) || []; } catch (e) { return []; }
}
function recordScore(height, stars) {
  const list = loadScores();
  const entry = { height, stars, date: Date.now(), id: Date.now() + '-' + Math.random() };
  list.push(entry);
  list.sort((a, b) => b.height - a.height || b.stars - a.stars);
  const top = list.slice(0, 10);
  try { localStorage.setItem(SCORE_KEY, JSON.stringify(top)); } catch (e) {}
  return { top, currentId: entry.id };
}
function renderHistory(top, currentId) {
  const el = document.getElementById('scoreHistory');
  if (!top.length) { el.innerHTML = '<div class="histEmpty">No climbs yet — this is your first!</div>'; return; }
  el.innerHTML = top.map((s, i) => {
    const d = new Date(s.date);
    const date = (d.getMonth() + 1) + '/' + d.getDate();
    const cls = s.id === currentId ? 'histRow current' : 'histRow';
    return `<div class="${cls}"><span class="rank">#${i+1}</span><span class="ht">${s.height}m</span><span class="st">★ ${s.stars}</span><span class="date">${date}</span></div>`;
  }).join('');
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

function addPlatform() {
  const i = game.count;
  let x, w, y;
  if (i === 0) { w = 160; x = W/2 - 80; y = H - 60; }
  else { w = 60 + Math.random() * 90; x = Math.random() * (W - w); y = game.topY - GAP; }
  const zone = Math.max(0, Math.floor((game.originY - y) / ZONE_PX));
  const pal = paletteFor(zone);
  const pl = { x, y, w, h: 12, color: pal[i % pal.length] };
  if (i >= 5) {
    const r = Math.random();
    if (r < 0.20) pl.vx = (0.7 + Math.random() * 1.1) * (Math.random() < 0.5 ? -1 : 1);
    else if (r < 0.38) { pl.crumble = true; pl.timer = 0; }
  }
  game.platforms.push(pl);
  if (i >= 3 && i % 2 === 1 && !pl.vx && !pl.crumble) {
    game.coins.push({ x: pl.x + pl.w/2 - 8, y: pl.y - 28, collected: false });
  }
  game.count = i + 1;
  game.topY = y;
}

function ensurePlatforms() {
  while (game.topY - game.cameraY > -H * 1.3) addPlatform();
}

function initGame() {
  game = {
    player: { x: W/2-14, y: H-96, w: 28, h: 36, vx: 0, vy: 0, onGround: false, jumpsLeft: 2 },
    platforms: [], coins: [], cameraY: 0, maxHeight: 0, score: 0, coinCount: 0, alive: true,
    count: 0, topY: 0, originY: H * 0.4
  };
  ensurePlatforms();
}

function update() {
  if (!game || !game.alive) return;
  const p = game.player;
  const left = keys['ArrowLeft']||keys['a']||keys['A']||touchLeft;
  const right = keys['ArrowRight']||keys['d']||keys['D']||touchRight;
  const jump = keys['ArrowUp']||keys['w']||keys['W']||keys[' ']||touchJump;

  if (left) p.vx = -SPEED;
  else if (right) p.vx = SPEED;
  else p.vx *= 0.8;

  if (jump && p.jumpsLeft > 0 && !game.prevJump) { p.vy = JUMP; if (!p.onGround) p.jumpsLeft--; p.onGround = false; }
  game.prevJump = jump;

  p.vy += GRAVITY;
  p.x += p.vx;
  p.y += p.vy;

  if (p.x < 0) p.x = 0;
  if (p.x + p.w > W) p.x = W - p.w;

  for (const pl of game.platforms) {
    if (pl.vx) {
      pl.x += pl.vx;
      if (pl.x < 0) { pl.x = 0; pl.vx *= -1; }
      else if (pl.x + pl.w > W) { pl.x = W - pl.w; pl.vx *= -1; }
    }
    if (pl.triggered && !pl.gone && ++pl.timer > CRUMBLE_FRAMES) pl.gone = true;
    if (pl.gone) { pl.fallY = (pl.fallY || 0) + 0.6; pl.y += pl.fallY; }
  }

  p.onGround = false;
  for (const pl of game.platforms) {
    if (pl.gone) continue;
    const py = pl.y - game.cameraY;
    if (p.vy > 0 && p.x+p.w > pl.x && p.x < pl.x+pl.w && p.y+p.h > py && p.y+p.h < py+pl.h+14) {
      p.y = py - p.h; p.vy = 0; p.onGround = true; p.jumpsLeft = 2;
      if (pl.vx) { p.x += pl.vx; if (p.x < 0) p.x = 0; if (p.x + p.w > W) p.x = W - p.w; }
      if (pl.crumble) pl.triggered = true;
    }
  }

  if (p.y < H * 0.4) {
    const diff = H * 0.4 - p.y;
    game.cameraY -= diff; p.y += diff;
    const h = Math.round(-game.cameraY / 10);
    if (h > game.maxHeight) game.maxHeight = h;
    game.score = game.maxHeight;
    ensurePlatforms();
    game.platforms = game.platforms.filter(pl => pl.y - game.cameraY < H + 300);
    game.coins = game.coins.filter(c => !c.collected && c.y - game.cameraY < H + 300);
  }

  for (const c of game.coins) {
    if (c.collected) continue;
    const cy = c.y - game.cameraY;
    if (p.x < c.x+16 && p.x+p.w > c.x && p.y < cy+16 && p.y+p.h > cy) {
      c.collected = true; game.coinCount++;
    }
  }

  document.getElementById('scoreDisplay').textContent = `Height: ${game.maxHeight}m  ★ ${game.coinCount}`;

  if (p.y > H + 60) {
    game.alive = false;
    document.getElementById('finalScore').textContent = `Height: ${game.maxHeight}m`;
    document.getElementById('finalCoins').textContent = `Stars collected: ${game.coinCount}`;
    const { top, currentId } = recordScore(game.maxHeight, game.coinCount);
    renderHistory(top, currentId);
    document.getElementById('gameButtons').style.display = 'none';
    document.getElementById('gameOverScreen').style.display = 'flex';
  }
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = ah>>16, ag = (ah>>8)&255, ab = ah&255;
  const br = bh>>16, bg = (bh>>8)&255, bb = bh&255;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function zoneBg() {
  const zf = Math.max(0, (-game.cameraY) / ZONE_PX);
  const base = Math.floor(zf), frac = zf - base;
  const tt = frac > 0.8 ? (frac - 0.8) / 0.2 : 0;
  const a = THEMES[base % THEMES.length], b = THEMES[(base+1) % THEMES.length];
  return { top: lerpColor(a.bgTop, b.bgTop, tt), bottom: lerpColor(a.bgBottom, b.bgBottom, tt) };
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const bg = zoneBg();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, bg.top); grad.addColorStop(1, bg.bottom);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 80; i++) {
    const sx = (i * 137 + 23) % W;
    const sy = ((i * 97 + 11 + Math.floor(game.cameraY * 0.05)) % H + H) % H;
    ctx.fillStyle = `rgba(255,255,255,${0.15 + (i%4)*0.12})`;
    ctx.fillRect(sx, sy, i%5===0?2:1, i%5===0?2:1);
  }

  for (const pl of game.platforms) {
    const py = pl.y - game.cameraY;
    if (py < -20 || py > H+20) continue;
    let drawX = pl.x, alpha = 1;
    if (pl.crumble) {
      if (pl.gone) alpha = Math.max(0, 1 - (pl.fallY || 0) / 9);
      else if (pl.triggered) { drawX += Math.sin(pl.timer * 0.9) * 2; alpha = 1 - (pl.timer / CRUMBLE_FRAMES) * 0.45; }
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pl.color;
    ctx.beginPath(); ctx.roundRect(drawX, py, pl.w, pl.h, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(drawX+4, py+2, pl.w-8, 3);
    if (pl.crumble) {
      ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(drawX+pl.w*0.35, py); ctx.lineTo(drawX+pl.w*0.3, py+pl.h);
      ctx.moveTo(drawX+pl.w*0.62, py); ctx.lineTo(drawX+pl.w*0.7, py+pl.h);
      ctx.stroke();
    }
    if (pl.vx) {
      const mid = drawX + pl.w/2, ay = py + pl.h/2, d = pl.vx > 0 ? 1 : -1;
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.moveTo(mid + d*5, ay); ctx.lineTo(mid - d*3, ay-3.5); ctx.lineTo(mid - d*3, ay+3.5);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  for (const c of game.coins) {
    if (c.collected) continue;
    const cy = c.y - game.cameraY;
    if (cy < -20 || cy > H+20) continue;
    ctx.fillStyle = '#ffe14d';
    ctx.beginPath(); ctx.arc(c.x+8, cy+8, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a2d6b'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', c.x+8, cy+12);
  }

  const p = game.player;
  if (p.jumpsLeft === 1 && !p.onGround) {
    ctx.fillStyle = 'rgba(45,226,230,0.5)'; ctx.beginPath(); ctx.arc(p.x+p.w/2, p.y+p.h/2, 18, 0, Math.PI*2); ctx.fill();
  }
  drawAvatar(ctx, p.x, p.y, p.w, p.h, AVATARS[selectedAvatar]);

  if (currentUser) {
    const name = currentUser.username;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(name).width;
    const lx = p.x + p.w / 2, ly = p.y - 14;
    ctx.fillStyle = 'rgba(13,2,33,0.6)';
    ctx.beginPath(); ctx.roundRect(lx - tw/2 - 6, ly - 11, tw + 12, 16, 8); ctx.fill();
    ctx.fillStyle = '#2de2e6';
    ctx.fillText(name, lx, ly + 1);
  }
}

function loop() {
  if (game && game.alive) { update(); draw(); }
  requestAnimationFrame(loop);
}

// Builds avatar thumbnails into a container. `getSel` returns the current index,
// `onPick` is called with the chosen index.
function buildPicker(container, getSel, onPick) {
  container.innerHTML = '';
  AVATARS.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'avBtn' + (i === getSel() ? ' sel' : '');
    btn.title = a.name;
    const cv = document.createElement('canvas');
    cv.width = 46; cv.height = 66;
    const c = cv.getContext('2d');
    c.save(); c.translate(3.5, 11); c.scale(1.4, 1.4);
    drawAvatar(c, 0, 0, 28, 36, a);
    c.restore();
    btn.appendChild(cv);
    btn.onclick = () => {
      onPick(i);
      container.querySelectorAll('.avBtn').forEach((b, j) => b.classList.toggle('sel', j === i));
    };
    container.appendChild(btn);
  });
}

async function api(path, body) {
  const opts = { method: body ? 'POST' : 'GET', credentials: 'same-origin' };
  if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  let data = {};
  try { data = await res.json(); } catch {}
  return { ok: res.ok, status: res.status, data };
}

// ---- Screen helpers ----
const screens = ['authScreen', 'profileScreen', 'startScreen', 'gameOverScreen'];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).style.display = (s === id ? 'flex' : 'none'));
  document.getElementById('gameButtons').style.display = id ? 'none' : 'flex';
}

let currentUser = null; // { username, avatar }

function enterStartScreen() {
  document.getElementById('startUser').textContent = 'Climbing as ' + currentUser.username;
  showScreen('startScreen');
}

// ---- Auth screen ----
let authMode = 'login'; // 'login' | 'signup'
let signupAvatar = 0;

function setAuthMode(mode) {
  authMode = mode;
  const signup = mode === 'signup';
  document.getElementById('authSubtitle').textContent = signup ? 'Create an account to start climbing' : 'Sign in to start climbing';
  document.getElementById('authSubmit').textContent = signup ? 'Create Account' : 'Sign In';
  document.getElementById('authToggle').textContent = signup ? 'Already have an account? Sign in' : 'New here? Create an account';
  document.getElementById('authPickerWrap').style.display = signup ? 'block' : 'none';
  document.getElementById('authPass').autocomplete = signup ? 'new-password' : 'current-password';
  document.getElementById('authErr').textContent = '';
  if (signup) buildPicker(document.getElementById('signupPicker'), () => signupAvatar, i => signupAvatar = i);
}

document.getElementById('authToggle').onclick = () => setAuthMode(authMode === 'login' ? 'signup' : 'login');

document.getElementById('authSubmit').onclick = async () => {
  const username = document.getElementById('authUser').value;
  const password = document.getElementById('authPass').value;
  const err = document.getElementById('authErr');
  err.textContent = '';
  const path = authMode === 'signup' ? '/api/register' : '/api/login';
  const body = authMode === 'signup' ? { username, password, avatar: signupAvatar } : { username, password };
  const { ok, data } = await api(path, body);
  if (!ok) { err.textContent = data.error || 'Something went wrong.'; return; }
  currentUser = data;
  selectedAvatar = data.avatar;
  document.getElementById('authPass').value = '';
  enterStartScreen();
};
document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authSubmit').click(); });

// ---- Profile screen ----
let profileAvatar = 0;
document.getElementById('profileBtn').onclick = () => openProfile();
document.getElementById('profileCancel').onclick = () => enterStartScreen();
document.getElementById('profileSave').onclick = async () => {
  const username = document.getElementById('profileUser').value;
  const err = document.getElementById('profileErr');
  const { ok, data } = await api('/api/profile', { username, avatar: profileAvatar });
  if (!ok) { err.textContent = data.error || 'Could not save.'; return; }
  currentUser = data;
  selectedAvatar = data.avatar;
  enterStartScreen();
};

document.getElementById('logoutBtn').onclick = () => doLogout();

function openProfile() {
  profileAvatar = currentUser.avatar;
  document.getElementById('profileUser').value = currentUser.username;
  document.getElementById('profileErr').textContent = '';
  buildPicker(document.getElementById('profilePicker'), () => profileAvatar, i => profileAvatar = i);
  showScreen('profileScreen');
}
async function doLogout() {
  await api('/api/logout', {});
  currentUser = null;
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  setAuthMode('login');
  showScreen('authScreen');
}

document.getElementById('gameProfileBtn').onclick = () => { if (game) game.alive = false; openProfile(); };
document.getElementById('gameLogoutBtn').onclick = () => { if (game) game.alive = false; doLogout(); };

document.getElementById('startBtn').onclick = () => { initGame(); showScreen(''); };
document.getElementById('restartBtn').onclick = () => enterStartScreen();

setAuthMode('login');
(async () => {
  const { ok, data } = await api('/api/me');
  if (ok) { currentUser = data; selectedAvatar = data.avatar; enterStartScreen(); }
  else showScreen('authScreen');
})();
document.addEventListener('keydown', e => { keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key]=false; });

const lb=document.getElementById('leftBtn'), rb=document.getElementById('rightBtn'), jb=document.getElementById('jumpBtn');
lb.addEventListener('touchstart',e=>{touchLeft=true;e.preventDefault();},{passive:false}); lb.addEventListener('touchend',()=>touchLeft=false);
rb.addEventListener('touchstart',e=>{touchRight=true;e.preventDefault();},{passive:false}); rb.addEventListener('touchend',()=>touchRight=false);
jb.addEventListener('touchstart',e=>{touchJump=true;e.preventDefault();},{passive:false}); jb.addEventListener('touchend',()=>touchJump=false);
lb.addEventListener('mousedown',()=>touchLeft=true); lb.addEventListener('mouseup',()=>touchLeft=false);
rb.addEventListener('mousedown',()=>touchRight=true); rb.addEventListener('mouseup',()=>touchRight=false);
jb.addEventListener('mousedown',()=>touchJump=true); jb.addEventListener('mouseup',()=>touchJump=false);

initGame(); loop();
</script>
</body>
